name: Build Nova Client

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle 8.10
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.10'

      - name: Cache Loom
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/loom-cache
          key: ${{ runner.os }}-loom-${{ hashFiles('**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-loom-

      - name: Build
        run: gradle build --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx2g"

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: nova-client-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error
